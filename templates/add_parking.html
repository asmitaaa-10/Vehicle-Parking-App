<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Add Parking Lot</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-4">
        <form action="/add_parking" method="POST">
            <h1 class="text-center">Add Parking Lot</h1>
            <div class="mb-3">
              <label for="prime_location_name" class="form-label">Parking Lot Name</label>
              <input type="text" class="form-control" id="prime_location_name" name="prime_location_name" required>
            </div>
            <div class="mb-3">
              <label for="address" class="form-label">Address</label>
                <input type="text" class="form-control" id="address" name="address" required>
            </div>
            <div class="mb-3">
              <label for="pin_code" class="form-label">Pin Code</label>
              <input type="text" class="form-control" id="pin_code" name="pin_code" required>
            </div>
            <div class="mb-3">
                <label for="price" class="form-label">Price</label>
                <input type="number" class="form-control" id="price" name="price" required>
            </div>
            <div class="mb-3">
                <label for="number_of_spots" class="form-label">Number of Spots</label>
                <input type="number" class="form-control" id="number_of_spots" name="number_of_spots" required>
            </div>
            <button type="submit" class="btn btn-success px-4">Add Parking Lot</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
