<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <form method="POST">
                <h2 class="mb-4 text-center">Book a Parking Spot</h2>
                <div class="mb-3">
                    <label class="form-label">Parking Lot</label>
                    <input type="text" class="form-control" value="{{ parking.prime_location_name }}" readonly>
                </div>
                <div class="mb-3">
                    <label class="form-label">User ID</label>
                    <input type="text" class="form-control" value="{{ user_id }}" readonly>
                </div>
                <div class="mb-3">
                    <label class="form-label">Vehicle Number</label>
                    <input type="text" class="form-control" name="vehicle_number" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Book</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
