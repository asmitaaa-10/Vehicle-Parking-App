<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <form action="/booking/{{spot_id}}" method="POST">
                <h1 class="text-center">Book a Parking Spot</h1>
                <div class="mb-3">
                    <label for="parking_id" class="form-label">Parking Lot</label>
                    <input type="text" class="form-control" id="parking_id" name="parking_id" value="{{ parking.prime_location_name }}" readonly>
                </div>
                <div class="mb-3">
                    <label for="user_id" class="form-label">User ID</label>
                    <input type="text" class="form-control" id="user_id" name="user_id" value="{{ user_id }}" readonly>
                </div>
                <div class="mb-3">
                    <label for="vehicle_number" class="form-label">Vehicle Number</label>
                    <input type="text" class="form-control" id="vehicle_number" name="vehicle_number" placeholder="Enter your vehicle number" required>
                </div>
                <button type="submit" class="btn btn-primary">Book</button>
            </form>
        </div>
</div>
</body>

</html>
