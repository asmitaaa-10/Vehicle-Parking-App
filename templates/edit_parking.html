<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Parking Lot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}


    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <form action="/edit_parking/{{parking.id}}" method="POST">
                        <h1 class="text-center">Edit Parking Lot</h1>
                        <div class="mb-3">
                            <label for="prime_location_name" class="form-label">Parking Lot Name</label>
                            <input type="text" class="form-control" id="prime_location_name" name="prime_location_name" value="{{ parking.prime_location_name }}" required>
                        </div>
                        <div class="mb-3">
                            <label for="address" class="form-label">Address</label>
                            <input type="text" class="form-control" id="address" name="address" value="{{ parking.address }}" required>
                        </div>
                        <div class="mb-3">
                            <label for="pin_code" class="form-label">Pin Code</label>
                            <input type="text" class="form-control" id="pin_code" name="pin_code" value="{{ parking.pin_code }}" required>
                        </div>
                        <div class="mb-3">
                            <label for="price" class="form-label">Price</label>
                            <input type="number" class="form-control" id="price" name="price" value="{{ parking.price }}" required>
                        </div>
                        <div class="mb-3">
                            <label for="number_of_spots" class="form-label">Number of Spots</label>
                            <input type="number" class="form-control" id="number_of_spots" name="number_of_spots" value="{{ parking.number_of_spots }}" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Update Parking Lot</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
